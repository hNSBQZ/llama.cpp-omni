<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640">
<style>
text{font-family:Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#172033}
.title{font-size:22px;font-weight:700}.subtitle{font-size:13px;fill:#5b6475}
.label{font-size:13px}.small{font-size:11px;fill:#5b6475}.tiny{font-size:10px;fill:#5b6475}
.lane{fill:#f6f8fb;stroke:#d6dde8}.box{rx:12;ry:12;stroke:#29415f;stroke-width:1.2}
</style>
<rect width="1180" height="640" fill="#ffffff"/>
<text x="40" y="42" class="title">Omni Duplex 实测流水线</text>
<text x="40" y="66" class="subtitle">主线程按 chunk 串行推进；LLM KV prefill、TTS 和 T2W 在后台线程中异步执行</text>
<rect x="30" y="68" width="1120" height="92" class="lane" rx="14"/>
<text x="48" y="96" class="label" font-weight="700">主线程 / API</text>
<rect x="30" y="193" width="1120" height="92" class="lane" rx="14"/>
<text x="48" y="221" class="label" font-weight="700">LLM 线程</text>
<rect x="30" y="318" width="1120" height="92" class="lane" rx="14"/>
<text x="48" y="346" class="label" font-weight="700">TTS 线程</text>
<rect x="30" y="443" width="1120" height="92" class="lane" rx="14"/>
<text x="48" y="471" class="label" font-weight="700">T2W 线程</text>
<rect x="170" y="96" width="160" height="48" fill="#dcecff" class="box"/>
<text x="182" y="116" class="label" font-weight="700">api.stream_prefill</text>
<text x="182" y="134" class="small">vision + audio encode</text>
<rect x="365" y="96" width="150" height="48" fill="#d8f3dc" class="box"/>
<text x="377" y="116" class="label" font-weight="700">queue.llm</text>
<text x="377" y="134" class="small">enqueue embedding</text>
<rect x="560" y="96" width="150" height="48" fill="#fff2cc" class="box"/>
<text x="572" y="116" class="label" font-weight="700">api.stream_decode</text>
<text x="572" y="134" class="small">wait + sample</text>
<rect x="760" y="96" width="150" height="48" fill="#ffe4e6" class="box"/>
<text x="772" y="116" class="label" font-weight="700">decision</text>
<text x="772" y="134" class="small">LISTEN / SPEAK</text>
<rect x="365" y="222" width="165" height="48" fill="#e6dcff" class="box"/>
<text x="377" y="242" class="label" font-weight="700">llm.prefill</text>
<text x="377" y="260" class="small">write KV cache</text>
<rect x="560" y="222" width="165" height="48" fill="#ffd6a5" class="box"/>
<text x="572" y="242" class="label" font-weight="700">llm.decode</text>
<text x="572" y="260" class="small">token loop</text>
<rect x="760" y="347" width="180" height="48" fill="#d0f4de" class="box"/>
<text x="772" y="367" class="label" font-weight="700">tts.infer</text>
<text x="772" y="385" class="small">token/hidden -&gt; audio token</text>
<rect x="760" y="472" width="180" height="48" fill="#cde7ff" class="box"/>
<text x="772" y="492" class="label" font-weight="700">t2w.infer</text>
<text x="772" y="510" class="small">audio tokens -&gt; wav</text>
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#29415f"/></marker></defs>
<line x1="330" y1="120" x2="365" y2="120" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="515" y1="120" x2="560" y2="120" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="710" y1="120" x2="760" y2="120" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="440" y1="144" x2="440" y2="222" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="530" y1="246" x2="560" y2="246" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="635" y1="222" x2="635" y2="144" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="835" y1="144" x2="835" y2="347" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="850" y1="395" x2="850" y2="472" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="940" y1="496" x2="1040" y2="496" stroke="#29415f" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="60" y="585" class="small">• index=0 是 session/ref audio 初始化</text>
<text x="420" y="585" class="small">• decode 包含等待异步 KV prefill</text>
<text x="795" y="585" class="small">• TTS/T2W 与下一轮 chunk 重叠</text>
</svg>
